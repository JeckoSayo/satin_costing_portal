{% extends "costing/base.html" %}{% block content %}<div class="mb-4"><h1 class="page-title mb-1">Delete Material</h1><p class="page-subtitle">This action cannot be undone.</p></div><div class="card section-card bg-white" style="max-width:620px"><div class="p-4"><h4 class="fw-bold">Are you sure?</h4><div class="border rounded-3 p-3 bg-light mb-4"><strong>{{ object.item_name }}</strong><div class="text-muted">{{ object.category }}</div></div><form method="post">{% csrf_token %}<div class="d-flex gap-2"><button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash3 me-1"></i>Delete</button><a href="{% url 'materials' %}" class="btn btn-secondary px-4">Cancel</a></div></form></div></div>{% endblock %}
